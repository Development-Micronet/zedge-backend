services:
  zedge-backend:
    build:
      context: ./zedge-backend
      dockerfile: Dockerfile
    container_name: zedge-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      INQUIRY_RECEIVER_EMAIL: ${INQUIRY_RECEIVER_EMAIL:-}
      BREVO_DEV_FALLBACK: ${BREVO_DEV_FALLBACK:-false}
    ports:
      - "5050:5000"
    networks:
      - zedge-network

  zedge-frontend:
    build:
      context: ./zedge-frontend
      dockerfile: Dockerfile
    container_name: zedge-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - zedge-backend
    networks:
      - zedge-network

networks:
  zedge-network:
    driver: bridge
